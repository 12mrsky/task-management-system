<div class="layout">

  <!-- SIDEBAR -->

```
<h2 class="logo">TaskPro</h2>

<nav>

  <!-- Dashboard -->
  <a routerLink="/dashboard" routerLinkActive="active">

  </a>

  <!-- Tasks -->
  <a routerLink="/tasks" routerLinkActive="active">
    📋 Tasks
  </a>

  <!-- Admin: Manage Users -->
  <a

    routerLinkActive="active">

  </a>

  <!-- Admin: Create Task -->
  <a
    *ngIf="role === 'Admin'"
    routerLink="/add-task"
    routerLinkActive="active">
    ➕ Create Task
  </a>

</nav>
