<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <h2 class="logo">TaskPro</h2>

    <nav>

      <a routerLink="/dashboard" routerLinkActive="active">
        📊 Dashboard
      </a>

      <a routerLink="/tasks" routerLinkActive="active">
        📋 Tasks
      </a>

      <a 
        *ngIf="role==='Admin'" 
        routerLink="/add-task" 
        routerLinkActive="active">
        ➕ Create Task
      </a>

    </nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- TOPBAR -->
    <header class="topbar">

      <h3>Task Management System</h3>

      <button class="logout" (click)="logout()">
        Logout
      </button>

    </header>

    <!-- PAGE CONTENT -->
    <div class="page">
      <router-outlet></router-outlet>
    </div>

  </main>

</div>
